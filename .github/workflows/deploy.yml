name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PHP: ghcr.io/${{ github.repository_owner }}/treasury-php
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/treasury-web

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push PHP image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/php/Dockerfile.prod
          push: true
          tags: |
            ${{ env.IMAGE_PHP }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_PHP }}:latest
          cache-from: type=gha,scope=php
          cache-to: type=gha,mode=max,scope=php

      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web/Dockerfile.prod
          push: true
          tags: |
            ${{ env.IMAGE_WEB }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_WEB }}:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "compose.prod.yaml"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Pull, restart, migrate
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ needs.build.outputs.tag }}
          GHCR_OWNER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: IMAGE_TAG,GHCR_OWNER
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            export IMAGE_TAG GHCR_OWNER
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f compose.prod.yaml pull
            docker compose -f compose.prod.yaml up -d
            docker compose -f compose.prod.yaml exec -T php php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration
            docker image prune -f
