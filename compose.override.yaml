
services:
  php:
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - .:/app
      - php_vendor:/app/vendor

  frontend:
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

###> doctrine/doctrine-bundle ###
  database:
    ports:
      - "127.0.0.1:33306:3306"
###< doctrine/doctrine-bundle ###

  rabbitmq:
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"

  worker:
    volumes:
      - .:/app
      - php_vendor:/app/vendor
