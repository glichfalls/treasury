services:
  php:
    image: ghcr.io/${GHCR_OWNER}/treasury-php:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env.prod.local
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
    # Reach Plesk's MySQL on the host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "9000"
    volumes:
      - php_var:/app/var

  web:
    image: ghcr.io/${GHCR_OWNER}/treasury-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - php
    ports:
      # Bound to loopback only; Plesk reverse-proxies the public domain to this.
      - "127.0.0.1:8080:80"

volumes:
  php_var:
