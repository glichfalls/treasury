services:
  php:
    image: ghcr.io/${GHCR_OWNER}/treasury-php:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env.prod.local
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      REDIS_URL: "redis://redis:6379"
    # Reach Plesk's MySQL on the host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "9000"
    volumes:
      # Persist *only* sessions across deploys so users stay logged in. The Symfony
      # compiled cache (var/cache) must come from the image — mounting all of /app/var
      # like before shadowed the freshly-warmed cache with stale content from a previous
      # build and broke DI when constructor signatures changed.
      - php_sessions:/app/var/sessions

  # Long-lived worker that ticks the Symfony Scheduler and consumes the async
  # queue (RabbitMQ). The scheduler ticks `scheduler_default` and dispatches
  # RefreshPricesMessage / MaterializeRecurringMessage onto `async`; this same
  # process picks them up from RabbitMQ and runs the handlers. --time-limit
  # recycles the worker hourly to keep memory clean; restart: unless-stopped
  # brings it right back up.
  worker:
    image: ghcr.io/${GHCR_OWNER}/treasury-php:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env.prod.local
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      REDIS_URL: "redis://redis:6379"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: []
    command: ["php", "bin/console", "messenger:consume", "scheduler_default", "async", "-vv", "--time-limit=3600"]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    env_file:
      - .env.prod.local
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # appendonly persists the Scheduler's last-run state across deploys/restarts.
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - redis_data:/data

  web:
    image: ghcr.io/${GHCR_OWNER}/treasury-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - php
    ports:
      # Bound to loopback only; Plesk reverse-proxies the public domain to this.
      - "127.0.0.1:8080:80"

volumes:
  php_sessions:
  rabbitmq_data:
  redis_data:
