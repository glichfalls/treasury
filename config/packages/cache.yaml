framework:
    cache:
        # Stable namespace prefix so keys stay distinct if Redis is ever shared.
        prefix_seed: treasury

        # Redis is the shared cache backend for the app cache. It is also the
        # Symfony Scheduler's stateful store (see src/Schedule.php: ->stateful()).
        # Filesystem/array adapters are intentionally avoided here so this state is
        # shared across the separate `php` and `worker` containers and survives
        # deploys (var/cache comes from the image and is wiped each build).
        app: cache.adapter.redis
        default_redis_provider: '%env(REDIS_URL)%'

        # Namespaced pools use the "app" backend (Redis) by default.
        #pools:
            #my.dedicated.cache: null

when@test:
    framework:
        cache:
            # In-memory and isolated per test run; phpunit needs no live Redis.
            app: cache.adapter.array
