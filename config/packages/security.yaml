security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            json_login:
                check_path: api_login
                username_path: email
                password_path: password
            logout:
                path: api_logout
            # Remember-me: long-lived signed cookie that resurrects the session after
            # the PHP session expires. Opt-in via ?_remember_me=on on the login POST
            # (the frontend appends it when the checkbox is ticked) — json_login
            # doesn't parse the JSON body for this flag, so query string is the
            # reliable channel.
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 1209600        # 14 days
                path: /
                samesite: lax
                secure: auto             # HTTPS only when the request is HTTPS
                httponly: true
                always_remember_me: false

    access_control:
        - { path: ^/api/login,            roles: PUBLIC_ACCESS }
        - { path: ^/api/logout,           roles: PUBLIC_ACCESS }
        - { path: ^/api/register,         roles: PUBLIC_ACCESS, methods: [POST] }
        - { path: ^/api/password/forgot,  roles: PUBLIC_ACCESS, methods: [POST] }
        - { path: ^/api/password/reset,   roles: PUBLIC_ACCESS, methods: [POST] }
        - { path: ^/api,                  roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
