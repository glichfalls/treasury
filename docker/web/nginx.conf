server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 16m;

    # Long-cache hashed Vite assets. Scoped to real asset file extensions: the SPA
    # has client-side routes that also live under /assets/ (e.g. /assets/<ISIN> for
    # an asset detail page). A bare `location /assets/` would intercept those and
    # 404 on hard-reload/deep-link; matching only static extensions lets non-file
    # paths fall through to the index.html fallback below.
    location ~* ^/assets/.+\.(js|mjs|css|map|woff2?|ttf|otf|eot|png|jpe?g|gif|svg|webp|avif|ico)$ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API → PHP-FPM (Symfony). Symfony reads REQUEST_URI for routing, so we always
    # forward to /app/public/index.php and Symfony figures out the controller.
    location /api {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME /app/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /app/public;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param HTTPS $https if_not_empty;
        fastcgi_read_timeout 60s;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # SPA fallback for everything else
    location / {
        try_files $uri $uri/ /index.html;
    }
}